{% extends "base.html" %}

{% block content %}

<h1>Archived Messages</h1>
<p class="text-muted"> Messages you have archived.</p>

<div class="card shadow-sm">

    <div class="list-group list-group-flush">
        {% for message in archived_messages %}

        <div class="list-group-item">
         <div class="d-flex justify-content-between align-items-start">
            <div>
        
                <strong>{{ message.subject }}</strong><br>
                <small class="text-muted">{{ message.sent_at }} </small>
            </div>

            <small class="text-muted">From: {{ message.sender.username }}

            </small>
            </div>

            <div class="mt-3">
                <a href="{% url 'message_detail' message.pk %}"
                class="btn btn-sm btn-outline-primary">View</a>

    
                <a href="{% url 'unarchive_message' message.pk %}"
                class="btn btn-sm btn-outline-success">Restore</a>

            </div>
        </div>
        {% empty %}

        <div class="list-group-item text-muted">
            No archived messages
        </div>

        {% endfor %}


    </div>
</div>


{% endblock %}
