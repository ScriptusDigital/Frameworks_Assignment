{% extends "base.html" %}

{% block content %}

<h1>Sent messages</h1>
<p class="text-muted"> Messages you have sent.</p>

<div class="card shadow-sm">

    <div class="list-group list-group-flush">
        {% for message in sent_messages %}
        <a href="{% url 'message_detail' message.pk %}" class="list-group-item list-group-item-action">
            <div class="d-flex justify-content-between">
                <strong>{{ message.subject }}</strong>
                <small class="text-muted">{{ message.sent_at }} </small>
            </div>
            <div class="text-muted">To: {{ message.recipient.username }}

            </div>
        </a>
        {% empty %}

        <div class="list-group-item text-muted">
            You do not have any sent messages.
        </div>

        {% endfor %}


    </div>
</div>


{% endblock %}
