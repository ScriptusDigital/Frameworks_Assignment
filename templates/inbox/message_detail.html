{% extends "base.html" %}

{% block content %}

<div class="mb-4">
    <a href="{% url 'inbox' %}" class="text-decoration-none">&larr; Back to Inbox
     </a>
    <div>

        <div class="card shadow-sm">
            <div class="card-body">
                <h1 class="h4">{{ message.subject }}</h1>

                <p class="text-muted">
                    From: {{ message.sender.username }}|
                    To: {{ message.recipient.username }}|
                    {{ message.sent_at }}



                </p>




            </div>





        </div>
        <p class="text-muted mb-0"> View and manage your messages.</p>
    </div>
    
    
    

       {% endblock %}
