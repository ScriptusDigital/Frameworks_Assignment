{% load static %}
<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProjectPilot</title>
 <link rel="icon" type="image/jpeg" href="{% static 'images/PPfavicon.jpg' %}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  </head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" fw-semibold href="{% url 'dashboard' %}">
                ProjectPilot
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>


            <div class="collapse navbar-collapse" id="mainNavbar">  
                <div class="navbar-nav ms-auto">
    
    {% if user.is_authenticated %}
<a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a></li>
<a class="nav-link" href="{% url 'project_list' %}">Projects</a></li>
<a class="nav-link" href="{% url 'inbox' %}">Inbox</a></li>           
<a class="nav-link" href="{% url 'profile' %}">Profile</a></li>      

      
<form method="POST" action="{% url 'logout' %}" class="d-inline">
        {% csrf_token %}

        <button type="submit" class="btn btn-link nav-link">Logout</button>
</form>
    {% else %}
  <a class="nav-link" href="{% url 'login' %}">Login</a></li>
   <a class="nav-link" href="{% url 'register' %}">Register</a></li>
    {% endif %} 
</div>
</div>
</div>
</nav>


  
            

            <main class="container mt-4">
                {% block content %}
                {% endblock %}
            </main>

<footer class="border-top py-3 mt-5 bg-white">
                <div class="tcontainer text-muted small">
                2026 ProjectPilot. All rights reserved.
                </div>
            </footer>

 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js">  
             </script>
</body>
</html>
