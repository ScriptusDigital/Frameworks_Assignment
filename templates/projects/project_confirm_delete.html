{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow-sm border-danger">
            <div class="card-body">
                <h1 class="h4 mb-3">Delete Project</h1>

                <p>
                    Are you sure you want to delete
                    <strong>{{ object.name }}</strong>
                </p>

                <form method="post">
                    {% csrf_token %}
                    <a href="{% url 'project_detail' object.pk %}" class="btn btn-outline-secondary">Cancel</a>

                    <button type="submit" class="btn btn-danger confirm-action">Delete</button>


                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
