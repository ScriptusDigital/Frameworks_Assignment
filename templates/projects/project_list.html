{% extends "base.html" %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
<h1 class="mb-1">Projects</h1>

<p class="text-muted mb-0">Manage your projects and status updates</p>
  
</div>

<a href="{% url 'project_create' %}" class="btn btn-primary mb-3">Add Project</a>

</div>

<div class="card shadow-sm">
    <div class="card-body">


<tabel class="table align-middle">
<thead>
    <tr>
        <th scope="col">Project Name</th>
        <th scope="col">Description</th>
        <th scope="col">Owner</th>
        <th scope="col">Actions</th>
        </tr>   
</thead>
<tbody>
{% for project in projects %}
    <tr>
        <td>{{ project.name }}</td>
    



    </tr>
    {% endfor %}
</tbody>
</tabel>

    </div>


</div>


<h1>Projects Placeholder</h1>

{% endblock %}
