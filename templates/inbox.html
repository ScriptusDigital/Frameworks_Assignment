{% extends "base.html" %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h1 class="mb-1">Inbox</h1>
        <p class="text-muted mb-0"> View and manage your messages.</p>
    </div>


    <a href="{% url 'compose_message' %}" class="btn btn-primary">Compose</a>
     </div>


     <div class="card shadow-sm">
        <div class="list-group list-group-flush">
            {% for message in messages %}
        </div>
     </div>
{% endfor %}

{% endblock %}
